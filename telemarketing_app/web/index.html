<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电话销售流程控制台</title>
  <style>
    :root {
      --bg: #f2eadc;
      --panel: rgba(255, 251, 245, 0.92);
      --panel-strong: #fffdf8;
      --ink: #231c16;
      --muted: #6f6357;
      --line: rgba(80, 61, 40, 0.14);
      --accent: #b6542b;
      --accent-deep: #8e3f1e;
      --accent-soft: rgba(182, 84, 43, 0.1);
      --user: #27445d;
      --assistant: #f6e6d3;
      --chip: #efe4d4;
      --shadow: 0 18px 60px rgba(78, 55, 31, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(182, 84, 43, 0.14), transparent 24%),
        radial-gradient(circle at bottom right, rgba(39, 68, 93, 0.12), transparent 28%),
        linear-gradient(135deg, #efe5d4 0%, #f8f3eb 52%, #ece0cf 100%);
    }

    .layout {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 22px;
      display: grid;
      grid-template-columns: 300px minmax(420px, 1fr) 420px;
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .sidebar,
    .trace-shell {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .title {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
    }

    .field input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel-strong);
      padding: 12px 14px;
      font: inherit;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .field input:focus,
    textarea:focus {
      border-color: rgba(182, 84, 43, 0.45);
      transform: translateY(-1px);
    }

    .tips,
    .legend {
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--accent-soft);
      line-height: 1.7;
      font-size: 13px;
    }

    .legend strong,
    .tips strong {
      display: block;
      margin-bottom: 6px;
    }

    .chat-shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .chat-header {
      padding: 22px 24px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .chat-header h2,
    .trace-shell h2 {
      margin: 0 0 6px;
      font-size: 19px;
    }

    .status {
      white-space: nowrap;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(39, 68, 93, 0.12);
      background: rgba(39, 68, 93, 0.08);
      color: var(--muted);
      font-size: 12px;
    }

    .messages {
      padding: 22px 24px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0.14)),
        repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 30px,
          rgba(111, 99, 87, 0.04) 31px
        );
    }

    .bubble {
      max-width: 86%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.7;
      white-space: pre-wrap;
      animation: rise 0.22s ease;
    }

    .bubble.user {
      align-self: flex-end;
      color: #fff;
      background: linear-gradient(135deg, var(--user), #183247);
      border-bottom-right-radius: 7px;
    }

    .bubble.assistant {
      align-self: flex-start;
      background: var(--assistant);
      border: 1px solid rgba(182, 84, 43, 0.14);
      border-bottom-left-radius: 7px;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .composer {
      padding: 18px 24px 24px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      background: rgba(255, 252, 246, 0.75);
      align-items: end;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      max-height: 240px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 12px 16px;
      font: inherit;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.56; cursor: not-allowed; transform: none; }

    .primary {
      min-width: 136px;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #fff;
    }

    .ghost {
      background: rgba(39, 68, 93, 0.08);
      color: var(--ink);
    }

    .trace-grid {
      display: grid;
      gap: 14px;
      overflow: auto;
    }

    .summary-box,
    .panel {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .summary-box p,
    .panel p {
      margin: 0;
      line-height: 1.7;
      font-size: 14px;
    }

    .workflow-step {
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(239, 228, 212, 0.6));
      border: 1px solid var(--line);
    }

    .workflow-step h3,
    .panel h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .micro {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }

    .code-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .code-item {
      padding: 12px;
      border-radius: 14px;
      background: rgba(239, 228, 212, 0.5);
      border: 1px solid var(--line);
    }

    .mono {
      display: block;
      margin-top: 6px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(7px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1240px) {
      .layout {
        grid-template-columns: 280px 1fr;
      }

      .trace-shell {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 880px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: row;
      }

      .bubble {
        max-width: 94%;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="card sidebar">
      <div>
        <h1 class="title">电话销售流程台</h1>
        <p class="subtitle">左侧填测试身份，中间模拟客户和销售多轮对话，右侧实时展开“抽取、路由、检索、话术、业务动作”每一层都做了什么。</p>
      </div>

      <div class="field">
        <label for="nickname">用户昵称</label>
        <input id="nickname" placeholder="例如：张女士">
      </div>

      <div class="field">
        <label for="channel">渠道</label>
        <input id="channel" value="phone">
      </div>

      <div class="field">
        <label for="userId">用户 ID</label>
        <input id="userId">
      </div>

      <div class="field">
        <label for="sessionKey">会话 ID</label>
        <input id="sessionKey">
      </div>

      <div class="tips">
        <strong>建议先测这几句</strong>
        你是谁？<br>
        你们价格怎么报？<br>
        孩子初二数学，微信 abc12345<br>
        我想投诉，老师老迟到
      </div>

      <div class="legend">
        <strong>右侧会看到什么</strong>
        本轮摘要、每层决策、命中的知识库文件、涉及的代码入口，以及本轮真正用到的文件清单。
      </div>
    </aside>

    <main class="card chat-shell">
      <div class="chat-header">
        <div>
          <h2>人工对话测试</h2>
          <p class="subtitle">这个页面调用本地 <code>/chat</code> 和 <code>/system-map</code>，保留同一会话状态，方便连续观察行为变化。</p>
        </div>
        <div id="status" class="status">准备就绪</div>
      </div>

      <section id="messages" class="messages"></section>

      <form id="chatForm" class="composer">
        <textarea id="message" placeholder="请输入你要对销售说的话，例如：你是谁？"></textarea>
        <div class="actions">
          <button type="submit" class="primary" id="sendBtn">发送消息</button>
          <button type="button" class="ghost" id="resetBtn">重置会话</button>
        </div>
      </form>
    </main>

    <aside class="card trace-shell">
      <div>
        <h2>流程透视</h2>
        <p class="subtitle">这块不只是展示结果，而是把系统是怎么得出这句回复的展开给你看。</p>
      </div>
      <div id="traceRoot" class="trace-grid"></div>
    </aside>
  </div>

  <script>
    const nicknameInput = document.getElementById("nickname");
    const channelInput = document.getElementById("channel");
    const userIdInput = document.getElementById("userId");
    const sessionKeyInput = document.getElementById("sessionKey");
    const messageInput = document.getElementById("message");
    const messagesEl = document.getElementById("messages");
    const statusEl = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");
    const resetBtn = document.getElementById("resetBtn");
    const form = document.getElementById("chatForm");
    const traceRoot = document.getElementById("traceRoot");

    let systemMap = null;

    function randomId(prefix) {
      return `${prefix}-${Math.random().toString(36).slice(2, 10)}`;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function loadState() {
      const saved = JSON.parse(localStorage.getItem("telemarketing-workflow-state") || "{}");
      nicknameInput.value = saved.nickname || "网页测试用户";
      channelInput.value = saved.channel || "phone";
      userIdInput.value = saved.userId || randomId("web-user");
      sessionKeyInput.value = saved.sessionKey || randomId("web-session");

      const history = saved.history || [];
      if (!history.length) {
        addBubble("assistant", "您好，这里是电话销售测试台。您现在可以像真实客户一样连续提问，我会把每轮回复的内部流程也同步展开。", "", false);
      } else {
        history.forEach((item) => addBubble(item.role, item.text, item.meta, false));
      }
      renderTrace(saved.trace || null);
      scrollToBottom();
    }

    function saveState(trace = null) {
      const history = Array.from(messagesEl.querySelectorAll(".bubble")).map((node) => ({
        role: node.dataset.role,
        text: node.querySelector(".content").textContent,
        meta: node.querySelector(".meta")?.textContent || ""
      }));
      localStorage.setItem("telemarketing-workflow-state", JSON.stringify({
        nickname: nicknameInput.value.trim(),
        channel: channelInput.value.trim(),
        userId: userIdInput.value.trim(),
        sessionKey: sessionKeyInput.value.trim(),
        history,
        trace: trace || null
      }));
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function addBubble(role, text, meta = "", persist = true) {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${role}`;
      bubble.dataset.role = role;

      const content = document.createElement("div");
      content.className = "content";
      content.textContent = text;
      bubble.appendChild(content);

      if (meta) {
        const metaNode = document.createElement("div");
        metaNode.className = "meta";
        metaNode.textContent = meta;
        bubble.appendChild(metaNode);
      }

      messagesEl.appendChild(bubble);
      scrollToBottom();
      if (persist) saveState();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function panel(title, content) {
      return `<section class="panel"><h3>${escapeHtml(title)}</h3>${content}</section>`;
    }

    function renderTrace(trace) {
      const layers = (systemMap && systemMap.layers) || [];
      if (!trace) {
        traceRoot.innerHTML =
          panel("系统结构", `<p>页面已加载。发送一轮消息后，这里会显示本轮摘要、命中的知识库、涉及的代码入口和文件清单。</p>`) +
          panel("系统层", layers.map((layer) => `
            <div class="code-item">
              <strong>${escapeHtml(layer.layer)}</strong>
              <div class="micro">${escapeHtml(layer.goal)}</div>
              <span class="mono">${escapeHtml(layer.file_path)}</span>
            </div>
          `).join(""));
        return;
      }

      const workflowHtml = (trace.workflow || []).map((step) => `
        <div class="workflow-step">
          <h3>${escapeHtml(step.layer)}</h3>
          <p>${escapeHtml(step.action)}</p>
          <div class="micro">${escapeHtml(step.detail)}</div>
          <span class="mono">${escapeHtml(step.file_path || "")}</span>
          <div class="micro">${escapeHtml(step.code || "")}</div>
        </div>
      `).join("");

      const knowledgeHtml = (trace.knowledge_refs || []).length
        ? (trace.knowledge_refs || []).map((item) => `
            <div class="code-item">
              <strong>${escapeHtml(item.title)}</strong>
              <div class="micro">类型：${escapeHtml(item.kb_type)} | 场景：${escapeHtml(item.scene || "未标注")} | 分数：${escapeHtml(String(item.score))}</div>
              <div class="micro">匹配：${escapeHtml(item.matched_variant || "直接命中")}</div>
              <span class="mono">${escapeHtml(item.path)}</span>
            </div>
          `).join("")
        : `<p>本轮没有命中知识库，主要走的是策略或兜底分支。</p>`;

      const codeHtml = (trace.code_refs || []).map((item) => `
        <div class="code-item">
          <strong>${escapeHtml(item.layer)}</strong>
          <div class="micro">${escapeHtml(item.code)}</div>
          <span class="mono">${escapeHtml(item.file_path)}</span>
        </div>
      `).join("");

      const fileHtml = (trace.files_used || []).length
        ? `<div class="chips">${trace.files_used.map((file) => `<span class="chip">${escapeHtml(file)}</span>`).join("")}</div>`
        : `<p>本轮暂无文件引用。</p>`;

      traceRoot.innerHTML = `
        <section class="summary-box">
          <h3>本轮摘要</h3>
          <p>${escapeHtml(trace.summary || "暂无摘要")}</p>
          <div class="micro" style="margin-top:8px;">用户输入：${escapeHtml(trace.user_text || "")}</div>
        </section>
        ${panel("流程步骤", workflowHtml || "<p>暂无流程步骤。</p>")}
        ${panel("命中的知识库", knowledgeHtml)}
        ${panel("代码入口", `<div class="code-list">${codeHtml}</div>`)}
        ${panel("本轮用到的文件", fileHtml)}
      `;
    }

    async function fetchSystemMap() {
      const response = await fetch("/system-map");
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      systemMap = await response.json();
      renderTrace(JSON.parse(localStorage.getItem("telemarketing-workflow-state") || "{}").trace || null);
    }

    async function sendMessage(event) {
      event.preventDefault();
      const message = messageInput.value.trim();
      if (!message) return;

      const payload = {
        external_user_id: userIdInput.value.trim(),
        session_key: sessionKeyInput.value.trim(),
        channel: channelInput.value.trim() || "phone",
        nickname: nicknameInput.value.trim() || "网页测试用户",
        message
      };

      addBubble("user", message);
      messageInput.value = "";
      sendBtn.disabled = true;
      setStatus("系统正在分析...");

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        const meta = `intent=${data.intent} | reply_type=${data.reply_type} | next_action=${data.next_action}`;
        addBubble("assistant", data.reply, meta, false);
        renderTrace(data.trace || null);
        saveState(data.trace || null);
        setStatus("准备就绪");
      } catch (error) {
        addBubble("assistant", `请求失败：${error.message}`, "network_error", false);
        saveState();
        setStatus("请求失败");
      } finally {
        sendBtn.disabled = false;
      }
    }

    function resetSession() {
      localStorage.removeItem("telemarketing-workflow-state");
      messagesEl.innerHTML = "";
      userIdInput.value = randomId("web-user");
      sessionKeyInput.value = randomId("web-session");
      nicknameInput.value = "网页测试用户";
      channelInput.value = "phone";
      addBubble("assistant", "会话已重置。你可以重新从第一句开始测试，例如先问“你是谁？”。", "", false);
      renderTrace(null);
      saveState();
      setStatus("会话已重置");
    }

    form.addEventListener("submit", sendMessage);
    resetBtn.addEventListener("click", resetSession);
    [nicknameInput, channelInput, userIdInput, sessionKeyInput].forEach((input) => {
      input.addEventListener("change", () => saveState(JSON.parse(localStorage.getItem("telemarketing-workflow-state") || "{}").trace || null));
    });

    loadState();
    fetchSystemMap().catch((error) => {
      setStatus("系统图加载失败");
      traceRoot.innerHTML = panel("系统图加载失败", `<p>${escapeHtml(error.message)}</p>`);
    });
    saveState();
  </script>
</body>
</html>
